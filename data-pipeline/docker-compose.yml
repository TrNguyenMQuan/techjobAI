# YAML anchor: tránh lặp config cho 4 Airflow services
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    # Dùng LocalExecutor: chạy trực tiếp trong container scheduler, không cần worker
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Cho phép scheduler import từ source/ và pipeline/
    PYTHONPATH: /opt/airflow

    # MinIO — bên trong Docker dùng tên service, không phải localhost
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: admin
    MINIO_SECRET_KEY: admin123

    # Project Postgres — chạy trong Docker container
    POSTGRES_HOST: postgres-project
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB:-techjob_ai}
    POSTGRES_USER: ${POSTGRES_USER:-techjob}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techjob123}

    # Groq API Key for AI Agent features
    GROQ_API_KEY: ${GROQ_API_KEY:-}

  volumes:
    - ./dags:/opt/airflow/dags          # DAG files
    - ./pipeline:/opt/airflow/pipeline  # PySpark pipeline scripts
    - ./source:/opt/airflow/source      # source modules (spark_session, storage, ...)
    - ./dbt_vietnamworks:/opt/airflow/dbt_vietnamworks   # dbt
    - ml_models:/opt/airflow/models                      # ML models
    - airflow_logs:/opt/airflow/logs

  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-project:
      condition: service_healthy

services:
  # Object Storage 
  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: quay.io/minio/mc:latest
    container_name: techjobai_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin admin123 &&
      mc mb --ignore-existing local/bronze &&
      mc mb --ignore-existing local/silver &&
      echo 'Buckets ready: bronze, silver'
      "

  # Airflow Infrastructure
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"   # 5433 để không đụng Postgres local đang chạy ở 5432
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Services ─────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    # Chạy 1 lần duy nhất: migrate DB schema + tạo user admin/admin
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin &&
        echo 'Airflow init done'
      "
    restart: "no"   # không restart sau khi init xong

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Project Database (with pgvector) ────────────────────────────────────────
  postgres-project:
    image: pgvector/pgvector:pg15
    container_name: techjob-postgres-project
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-techjob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techjob123}
      POSTGRES_DB: ${POSTGRES_DB:-techjob_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_project_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-techjob} -d $${POSTGRES_DB:-techjob_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Project Backend (FastAPI API) ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: techjob-backend
    entrypoint: ["/usr/bin/dumb-init", "--", "/home/airflow/.local/bin/uvicorn"]
    command: be.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: ep-odd-feather-aok9wn0q.c-2.ap-southeast-1.aws.neon.tech
      POSTGRES_PORT: 5432
      POSTGRES_DB: neondb
      POSTGRES_USER: machine_learning_readonly
      POSTGRES_PASSWORD: machine_learning
      PGSSLMODE: require
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PYTHONPATH: /opt/airflow
    volumes:
      - ./be:/opt/airflow/be
      - ./fe:/opt/airflow/fe
      - ./ai:/opt/airflow/ai
      - ./pipeline:/opt/airflow/pipeline
      - ./source:/opt/airflow/source
      - ./.env:/opt/airflow/.env
      - ml_models:/opt/airflow/models
    depends_on:
      postgres-project:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2 # h2 database use to save config about metabase
      MB_DB_FILE: /metabase-data/metabase.db 
    volumes:
      - metabase-data:/metabase-data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  minio_data:
  postgres_airflow_data:
  postgres_project_data:
  airflow_logs:
  metabase-data:
  ml_models:
